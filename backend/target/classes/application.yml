spring:
  datasource:
    url: jdbc:mysql://localhost:3306/teambrain?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: teambrain
    password: ${MYSQL_TEAMBRAIN_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always
      data-locations: classpath:data.sql

server:
  address: 0.0.0.0
  port: 8080

jwt:
  secret: teambrain-jwt-secret-key-2026-this-is-a-course-project
  expiration: 86400000
